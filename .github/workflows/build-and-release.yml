name: Build and Release

# 触发条件：
# - PR 到 main：运行编译验证（compileDebugKotlin 全模块）
# - 推送 v* tag：构建 release APK 并发布到 GitHub Release
on:
  pull_request:
    branches: [ main ]
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # 发布 Release、上传资源需要

jobs:
  # PR 编译验证：确保改动可编译通过
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Compile all modules (debug)
        # --no-parallel 规避 org.gradle.parallel=true 下 R8/编译器偶发并发问题
        run: ./gradlew compileDebugKotlin --no-daemon --no-parallel --stacktrace

  # tag 推送：构建 release APK 并发布
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # #303 修复：CI 从 secret 注入 release keystore，不再静默回退 debug 签名。
      # 所需 secrets（仓库 Settings → Secrets and variables → Actions 配置）：
      #   RELEASE_KEYSTORE_BASE64   base64 编码的 .jks/.keystore 文件
      #   RELEASE_KEYSTORE_PASSWORD keystore 密码
      #   RELEASE_KEY_ALIAS         key 别名
      #   RELEASE_KEY_PASSWORD      key 密码
      # 任一 secret 缺失则本步骤失败，中止发布（避免用 debug key 发布正式 APK）。
      - name: Decode release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          if [ -z "$RELEASE_KEYSTORE_BASE64" ] || [ -z "$RELEASE_KEYSTORE_PASSWORD" ] || \
             [ -z "$RELEASE_KEY_ALIAS" ] || [ -z "$RELEASE_KEY_PASSWORD" ]; then
            echo "::error::缺少 release 签名 secret(s)，无法安全构建正式 release APK。"
            echo "::error::请配置 RELEASE_KEYSTORE_BASE64 / RELEASE_KEYSTORE_PASSWORD / RELEASE_KEY_ALIAS / RELEASE_KEY_PASSWORD。"
            echo "::error::拒绝回退到 debug 签名（#303）。"
            exit 1
          fi
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > ${{ github.workspace }}/release.keystore
          cat > ${{ github.workspace }}/keystore.properties <<EOF
          storeFile=${{ github.workspace }}/release.keystore
          storePassword=$RELEASE_KEYSTORE_PASSWORD
          keyAlias=$RELEASE_KEY_ALIAS
          keyPassword=$RELEASE_KEY_PASSWORD
          EOF

      - name: Assemble release APK
        # #303：R8 混淆已强制开启（AGP 8.7.3 修复了 8.6.0 的 R8 CME bug），
        # 不再传 -PciDisableMinify。签名由上一步注入的 keystore.properties 提供。
        run: ./gradlew assembleRelease --no-daemon --no-parallel --stacktrace

      - name: Collect APK artifacts
        run: |
          mkdir -p artifacts
          find app/build/outputs/apk/release -name "*.apk" -exec cp {} artifacts/ \;
          ls -la artifacts/

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: artifacts/*.apk

      - name: Create GitHub Release and upload APKs
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*.apk
