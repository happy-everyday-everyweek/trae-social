name: Build and Release

# 触发条件：
# - PR 到 main：运行编译验证（compileDebugKotlin 全模块）
# - 推送 v* tag：构建 release APK 并发布到 GitHub Release
on:
  pull_request:
    branches: [ main ]
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # 发布 Release、上传资源需要

jobs:
  # PR 编译验证：确保改动可编译通过
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Compile all modules (debug)
        run: ./gradlew compileDebugKotlin --no-daemon --stacktrace

  # tag 推送：构建 release APK 并发布
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Assemble release APK
        # keystore.properties 不存在时回退 debug 签名，CI 仍可构建出可用 release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Collect APK artifacts
        run: |
          mkdir -p artifacts
          find app/build/outputs/apk/release -name "*.apk" -exec cp {} artifacts/ \;
          ls -la artifacts/

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: artifacts/*.apk

      - name: Create GitHub Release and upload APKs
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*.apk
